  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Bake © kWh into the unpacked HTML so it survives documentElement.replaceWith.
    template = template.replace(/<a id="kwh-copyright"[^>]*>[\s\S]*?<\/a>\s*/i, '');
    if (/<\/body>/i.test(template)) {

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to

      for (const a of old.attributes) s.setAttribute(a.name, a.value);

    // which fired before we swapped the document. Trigger manually if present.

lternate}\n.wingB{animation-delay:.06s}\n.wingSlow{animation-duration:.45s}\n@keyframes flap{from{transform:rotate(-12deg)}to{transform:rotate(21deg)}}\n@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}\n.navBtn{width:52px;height:52px;border:none;cursor:pointer;background:#241f18;color:#FBF7EA;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%);transition:background .2s,opacity .2s;font-family:'DM Sans',sans-serif}\n.navBtn:hover{background:#C2932A}\n.navBtn[disabled]{opacity:.25;cursor:default;background:#241f18}\n@media (max-width:820px){\n.copyCard{left:4vw !important;right:4vw !important;bottom:12vh !important;top:auto !important;max-width:none !important;padding:18px 20px 20px !important}\n#prog{display:none !important}\n}\n@media (prefers-reduced-motion: reduce){\n.wing{animation:none !important}\n.hexdot{animation:none !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div id=\"stage\" data-screen-label=\"Bee story — continuous world\" style=\"position:relative;height:100vh;overflow:hidden;touch-action:none\">\n  <svg id=\"world\" viewBox=\"0 0 1200 760\" preserveAspectRatio=\"xMidYMid slice\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fsvg>\n\n  <div id=\"heroCopy\" style=\"position:absolute;z-index:5;top:8vh;left:50%;transform:translateX(-50%);text-align:center;max-width:880px;width:92%;pointer-events:none\">\n    <h1 style=\"font-size:clamp(46px,7.6vw,100px);font-weight:900;letter-spacing:-.03em;line-height:1;margin:0\">Every bee<br>has a cell.<\u002Fh1>\n    <p style=\"margin:18px 0 0;font-size:clamp(17px,1.9vw,22px);font-weight:500;line-height:1.6;color:#4b4433\">A tale about a hive that learned to work as one —<br>and what happened when trouble came knocking.<\u002Fp>\n  <\u002Fdiv>\n  <div id=\"scrollHint\" style=\"position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:6;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none\">\n    <div class=\"hexdot\" style=\"width:16px;height:16px;background:#E4B33C;clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%);animation:bob 1.6s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"font-size:12px;font-weight:700;letter-spacing:.18em;color:#8a7c58\">SCROLL OR PRESS → TO TRAVEL<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy2\" data-screen-label=\"Beat 2 — scattered\" style=\"position:absolute;z-index:5;left:5vw;bottom:8vh;max-width:380px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">The meadow grew scattered.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">Every garden raised its own hive — its own dance, its own doors. Whole fields of nectar sat unclaimed, <em style=\"font-style:italic;color:#C2932A;font-weight:700\">because no one could ask.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy3\" data-screen-label=\"Beat 3 — common dance\" style=\"position:absolute;z-index:5;left:5vw;bottom:8vh;max-width:380px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">Then came a common dance.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">One master bee, one signal — and exactly the right bees answer. <em style=\"font-style:italic;color:#C2932A;font-weight:700\">One voice, many listeners, zero translators.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy4\" data-screen-label=\"Beat 4 — the work\" style=\"position:absolute;z-index:5;left:5vw;bottom:8vh;max-width:380px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">Work happens at the source.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">The courier drinks straight from the flower and carries it home whole. <em style=\"font-style:italic;color:#C2932A;font-weight:700\">Nothing skimmed, nothing lost.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy5\" data-screen-label=\"Beat 5 — the attack\" style=\"position:absolute;z-index:5;left:3vw;top:10vh;max-width:290px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">Then trouble came.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">A black bumblebee dove straight for the comb — and bounced off a shield that was already on. <em style=\"font-style:italic;color:#C2932A;font-weight:700\">The bee next door never looked up.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy6\" data-screen-label=\"Beat 6 — the harvest\" style=\"position:absolute;z-index:5;right:4vw;top:8vh;max-width:340px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">Every drop counted.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">Each courier docks at its own cell, and every drop is credited to <em style=\"font-style:italic;color:#C2932A;font-weight:700\">the exact bee that earned it.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"copyCard\" id=\"copy7\" data-screen-label=\"Beat 7 — home in its cell\" style=\"position:absolute;z-index:5;left:4vw;top:10vh;max-width:340px;pointer-events:none;background:rgba(251,247,234,.9);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);padding:22px 26px 24px;border:1px solid rgba(36,31,24,.09);border-radius:16px;clip-path:inset(0% 0% 100% 0%)\">\n    <div style=\"width:40px;height:3px;background:#C2932A;margin:0 0 12px\"><\u002Fdiv>\n    <h2 style=\"font-size:clamp(24px,3vw,40px);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin:0 0 8px\">Home, in its own cell.<\u002Fh2>\n    <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.55;color:#4b4433;font-weight:500;margin:0\">Every bee has a cell only it can open — <em style=\"font-style:italic;color:#C2932A;font-weight:700\">safe inside, door sealed.<\u002Fem><\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"finaleOv\" data-screen-label=\"Finale\" style=\"position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(251,247,234,.93);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;visibility:hidden\">\n    <div id=\"finaleInner\" style=\"text-align:center;max-width:840px;padding:0 5vw\">\n      <svg id=\"svgF\" viewBox=\"0 0 220 160\" style=\"width:150px;height:auto;margin:0 auto 6px;display:block;overflow:visible\"><\u002Fsvg>\n      <h2 style=\"font-size:clamp(40px,6.6vw,84px);font-weight:900;letter-spacing:-.03em;line-height:1.04;margin:0\">We're building this hive.<\u002Fh2>\n      <p style=\"font-size:clamp(17px,1.9vw,22px);line-height:1.65;color:#4b4433;margin:22px 0 34px;font-weight:500\">A comb where every member has its own sealed cell. One common dance instead of a hundred dialects. Work done at the source and carried home whole. A shield that's simply always on. Every drop counted, and credited to whoever earned it.<\u002Fp>\n      <a href=\"https://kwhelectric.io\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;font-weight:900;font-size:17px;letter-spacing:.05em;color:#FBF7EA;background:#241f18;padding:18px 40px;border-radius:999px;text-decoration:none;transition:background .2s\" style-hover=\"background:#C2932A\">See the real thing → kwhelectric.io<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"prog\" style=\"position:absolute;right:20px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:10px\"><\u002Fdiv>\n\n  <div id=\"navUI\" style=\"position:absolute;bottom:22px;right:22px;z-index:60;display:flex;align-items:center;gap:12px\">\n    <div id=\"stepCount\" style=\"font-size:13px;font-weight:700;letter-spacing:.12em;color:#8a7c58\">1 / 9<\u002Fdiv>\n    <button id=\"navPrev\" class=\"navBtn\" aria-label=\"Previous step\">←<\u002Fbutton>\n    <button id=\"navNext\" class=\"navBtn\" aria-label=\"Next step\">→<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;progressDots&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Chrome&quot;},&quot;ambient&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;pace&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.6,&quot;max&quot;:1.8,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const t=()=>{ if(window.gsap&&window.MotionPathPlugin){ this._ready=true; this._init(); } else { this._t=setTimeout(t,60); } };\n    t();\n  }\n  componentWillUnmount(){\n    clearTimeout(this._t);\n    if(window.__beeNavClean){ window.__beeNavClean(); window.__beeNavClean=null; }\n    if(window.__beeWorldCtx){ try{window.__beeWorldCtx.revert();}catch(e){} window.__beeWorldCtx=null; }\n  }\n  componentDidUpdate(){ if(this._ready) this._init(); }\n  renderVals(){ return {}; }\n  _init(){\n    const props=this.props||{};\n    const PACE=Number(props.pace??1);\n    const SHOW_DOTS=props.progressDots??true;\n    const AMBIENT=props.ambient??true;\n    if(window.__beeNavClean){ window.__beeNavClean(); window.__beeNavClean=null; }\n    if(window.__beeWorldCtx){ try{window.__beeWorldCtx.revert();}catch(e){} }\n    gsap.registerPlugin(MotionPathPlugin);\n    window.__beeWorldCtx=gsap.context(()=>{\n    const RM=window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const INK='#241f18',GOLD='#E4B33C',DGOLD='#C2932A',HONEY='#F5C044',RED='#9E2B25',\n          BODY='#F4C452',HEAD='#332A1D',WING='#FFFCF0',CHEEK='#E8998D',\n          WAX='#EFDCA6',WAXO='#E7CE8F',WAXD='#DDC684',CELLDARK='#4A350D',\n          GREEN='#93A468',GREEND='#6F8049',BRANCH='#5C4230';\n    let uid=0;\n    const q=s=>document.querySelector(s);\n    const P=n=>(+n).toFixed(1);\n\n    /* ---------- geometry ---------- */\n    function hexPts(cx,cy,r){let s='';for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;s+=P(cx+r*Math.cos(a))+','+P(cy+r*Math.sin(a))+' ';}return s.trim();}\n    function hexPoly(cx,cy,r,fill,stroke,sw,extra){return '<polygon points=\"'+hexPts(cx,cy,r)+'\" fill=\"'+fill+'\"'+(stroke?' stroke=\"'+stroke+'\" stroke-width=\"'+sw+'\"':'')+' '+(extra||'')+'/>';}\n\n    /* ---------- the bee ---------- */\n    function bee(x,y,s,o){\n      s=s||1;o=o||{};\n      const id=++uid,flip=o.flip?-1:1,rot=o.rot||0;\n      const w=o.still?'':'wing ';\n      const droplet=o.droplet?`<g class=\"droplet\" opacity=\"${o.dropletOn?1:0}\">\n        <path d=\"M-2 40 C -13 56 -13 70 -2 76 C 9 70 9 56 -2 40 Z\" fill=\"${HONEY}\" stroke=\"${DGOLD}\" stroke-width=\"2.5\"/>\n        <circle cx=\"-6\" cy=\"60\" r=\"3.4\" fill=\"#FFF3CE\"/><\u002Fg>`:'';\n      const crown=o.master?`<g transform=\"translate(34,-34)\">\n        <path d=\"M-15 6 L15 6 L12 -3 L-12 -3 Z\" fill=\"${DGOLD}\"/>\n        <polygon points=\"${hexPts(-9,-9,5.5)}\" fill=\"${GOLD}\" stroke=\"${DGOLD}\" stroke-width=\"1.5\"/>\n        <polygon points=\"${hexPts(9,-9,5.5)}\" fill=\"${GOLD}\" stroke=\"${DGOLD}\" stroke-width=\"1.5\"/>\n        <polygon points=\"${hexPts(0,-13,7)}\" fill=\"${GOLD}\" stroke=\"${DGOLD}\" stroke-width=\"1.5\"/><\u002Fg>`:'';\n      const eye=o.sleep\n        ?`<path d=\"M30 -10 q8 7 17 -1\" stroke=\"#FBF7EA\" stroke-width=\"2.8\" fill=\"none\" stroke-linecap=\"round\"/>`\n        :`<circle cx=\"39\" cy=\"-11\" r=\"9.5\" fill=\"#FFFDF4\"/>\n          <g class=\"eyeP\"><circle cx=\"41.5\" cy=\"-10\" r=\"5.6\" fill=\"${INK}\"/>\n          <circle cx=\"43.5\" cy=\"-12.5\" r=\"2.3\" fill=\"#fff\"/>\n          <circle cx=\"39.5\" cy=\"-8\" r=\"1.1\" fill=\"#fff\" opacity=\".9\"/><\u002Fg>`;\n      return `<g class=\"beeG\" transform=\"translate(${x},${y}) rotate(${rot}) scale(${s*flip},${s})\">\n        <g class=\"${w}wingB\" transform=\"translate(-10,-20)\"><ellipse cx=\"9\" cy=\"-19\" rx=\"12\" ry=\"21\" fill=\"${WING}\" stroke=\"${DGOLD}\" stroke-width=\"1.8\" opacity=\".55\"/><\u002Fg>\n        <ellipse cx=\"-31\" cy=\"1\" rx=\"16\" ry=\"14\" fill=\"${INK}\"/>\n        <ellipse cx=\"0\" cy=\"0\" rx=\"33\" ry=\"26\" fill=\"${BODY}\"/>\n        <clipPath id=\"bc${id}\"><ellipse cx=\"0\" cy=\"0\" rx=\"33\" ry=\"26\"/><\u002FclipPath>\n        <g clip-path=\"url(#bc${id})\">\n          <rect x=\"-25\" y=\"-30\" width=\"12\" height=\"60\" rx=\"6\" fill=\"${INK}\"/>\n          <rect x=\"-3\" y=\"-30\" width=\"12\" height=\"60\" rx=\"6\" fill=\"${INK}\"/>\n          <ellipse cx=\"2\" cy=\"18\" rx=\"27\" ry=\"10\" fill=\"rgba(36,31,24,.07)\"/>\n        <\u002Fg>\n        <g stroke=\"${INK}\" stroke-width=\"3\" stroke-linecap=\"round\" fill=\"none\" opacity=\".85\">\n          <path d=\"M-8 24 q-2 9 -8 11\"/><path d=\"M8 23 q2 9 -3 12\"/>\n        <\u002Fg>\n        <circle cx=\"32\" cy=\"-8\" r=\"23\" fill=\"${HEAD}\"/>\n        <g class=\"antA\"><path d=\"M24 -28 q-3 -11 -11 -15\" stroke=\"${HEAD}\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"12\" cy=\"-44\" r=\"4.5\" fill=\"${o.master?GOLD:DGOLD}\"/><\u002Fg>\n        <g class=\"antB\"><path d=\"M37 -29 q3 -11 11 -13\" stroke=\"${HEAD}\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"49\" cy=\"-43\" r=\"4.5\" fill=\"${o.master?GOLD:DGOLD}\"/><\u002Fg>\n        ${eye}\n        <ellipse cx=\"34\" cy=\"2\" rx=\"5\" ry=\"3.4\" fill=\"${CHEEK}\" opacity=\".9\"/>\n        <path d=\"M40 1 q4 4 9 .5\" stroke=\"#FBF7EA\" stroke-width=\"2.2\" fill=\"none\" stroke-linecap=\"round\"/>\n        ${crown}\n        <g class=\"${w}wingF\" transform=\"translate(2,-21)\">\n          <ellipse cx=\"14\" cy=\"-20\" rx=\"15\" ry=\"25\" fill=\"${WING}\" stroke=\"${DGOLD}\" stroke-width=\"2\" opacity=\".92\"/>\n          <path d=\"M8 -34 q7 9 9 24\" stroke=\"${DGOLD}\" stroke-width=\"1.4\" fill=\"none\" opacity=\".5\"/>\n          <path d=\"M16 -38 q4 10 5 26\" stroke=\"${DGOLD}\" stroke-width=\"1.4\" fill=\"none\" opacity=\".35\"/>\n          <ellipse cx=\"2\" cy=\"-10\" rx=\"9\" ry=\"16\" fill=\"${WING}\" stroke=\"${DGOLD}\" stroke-width=\"1.6\" opacity=\".8\" transform=\"rotate(-18 2 -10)\"/>\n        <\u002Fg>\n        ${droplet}\n      <\u002Fg>`;\n    }\n\n    /* ---------- the black bumblebee ---------- */\n    function bumble(x,y,s,flip){\n      const id=++uid;let fur='';\n      for(let i=0;i<16;i++){\n        const a=(i/16)*Math.PI*2,bx=Math.cos(a)*46,by=Math.sin(a)*36,ex=Math.cos(a)*53,ey=Math.sin(a)*43;\n        fur+='<path d=\"M'+P(bx)+' '+P(by)+' L'+P(ex)+' '+P(ey)+'\"/>';\n      }\n      return `<g class=\"bumbleArt\" transform=\"translate(${x},${y}) scale(${flip?-s:s},${s})\">\n        <g class=\"wing wingSlow\" transform=\"translate(-16,-30)\"><ellipse cx=\"12\" cy=\"-18\" rx=\"15\" ry=\"24\" fill=\"rgba(210,204,190,.4)\" stroke=\"#5d574b\" stroke-width=\"2\"/><\u002Fg>\n        <path d=\"M-84 -2 L-108 6 L-84 14 Z\" fill=\"#0e0a06\"/>\n        <ellipse cx=\"-46\" cy=\"3\" rx=\"27\" ry=\"23\" fill=\"#15100b\"/>\n        <g stroke=\"#15100b\" stroke-width=\"2.6\" stroke-linecap=\"round\" opacity=\".85\">${fur}<\u002Fg>\n        <ellipse cx=\"0\" cy=\"0\" rx=\"46\" ry=\"36\" fill=\"#1d1710\"/>\n        <clipPath id=\"bb${id}\"><ellipse cx=\"0\" cy=\"0\" rx=\"46\" ry=\"36\"/><\u002FclipPath>\n        <g clip-path=\"url(#bb${id})\">\n          <rect x=\"-30\" y=\"-40\" width=\"14\" height=\"80\" rx=\"7\" fill=\"#0b0805\"/>\n          <rect x=\"-2\" y=\"-40\" width=\"14\" height=\"80\" rx=\"7\" fill=\"#0b0805\"/>\n          <ellipse cx=\"0\" cy=\"24\" rx=\"44\" ry=\"12\" fill=\"rgba(0,0,0,.35)\"/>\n        <\u002Fg>\n        <g stroke=\"#15100b\" stroke-width=\"4\" stroke-linecap=\"round\" fill=\"none\">\n          <path d=\"M-16 32 q-3 11 -10 14\"/><path d=\"M4 34 q0 12 -6 16\"/><path d=\"M22 30 q4 10 12 12\"/>\n        <\u002Fg>\n        <circle cx=\"44\" cy=\"-8\" r=\"25\" fill=\"#15100b\"/>\n        <circle cx=\"52\" cy=\"-10\" r=\"8.5\" fill=\"#F5EFE0\"/>\n        <circle cx=\"54.5\" cy=\"-9\" r=\"4.6\" fill=\"#0b0805\"/>\n        <circle cx=\"56\" cy=\"-11\" r=\"1.6\" fill=\"#fff\"/>\n        <path d=\"M40 -26 l22 6\" stroke=\"#0b0805\" stroke-width=\"6\" stroke-linecap=\"round\"/>\n        <path d=\"M48 6 q6 2 11 -3\" stroke=\"#050302\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"/>\n        <path d=\"M34 -30 q-2 -11 -10 -16\" stroke=\"#15100b\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\"/>\n        <circle cx=\"23\" cy=\"-48\" r=\"5\" fill=\"${RED}\"/>\n        <path d=\"M50 -28 q4 -11 12 -13\" stroke=\"#15100b\" stroke-width=\"3.5\" fill=\"none\" stroke-linecap=\"round\"/>\n        <circle cx=\"63\" cy=\"-43\" r=\"5\" fill=\"${RED}\"/>\n        <g class=\"wing wingSlow\" transform=\"translate(-2,-28)\">\n          <ellipse cx=\"12\" cy=\"-20\" rx=\"18\" ry=\"27\" fill=\"rgba(222,216,202,.5)\" stroke=\"#5d574b\" stroke-width=\"2.4\"/>\n          <path d=\"M6 -36 q7 10 9 26\" stroke=\"#5d574b\" stroke-width=\"1.4\" fill=\"none\" opacity=\".5\"/>\n        <\u002Fg>\n      <\u002Fg>`;\n    }\n\n    /* ---------- the peeker ---------- */\n    function peeker(x,y,s){\n      return `<g class=\"peeker\" transform=\"translate(${P(x)},${P(y)}) scale(${s})\">\n        <circle cx=\"0\" cy=\"0\" r=\"15\" fill=\"${HEAD}\"/>\n        <g class=\"pkEyes\">\n          <circle cx=\"-5.5\" cy=\"-3\" r=\"5\" fill=\"#FFFDF4\"/><circle cx=\"-4\" cy=\"-2.6\" r=\"2.6\" fill=\"${INK}\"/><circle cx=\"-3\" cy=\"-4.2\" r=\"1\" fill=\"#fff\"/>\n          <circle cx=\"6.5\" cy=\"-3\" r=\"5\" fill=\"#FFFDF4\"/><circle cx=\"8\" cy=\"-2.6\" r=\"2.6\" fill=\"${INK}\"/><circle cx=\"9\" cy=\"-4.2\" r=\"1\" fill=\"#fff\"/>\n        <\u002Fg>\n        <path d=\"M-8 -13 q-3 -8 -9 -10\" stroke=\"${HEAD}\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"-18\" cy=\"-24\" r=\"3.2\" fill=\"${DGOLD}\"/>\n        <path d=\"M6 -13 q3 -8 9 -9\" stroke=\"${HEAD}\" stroke-width=\"2.4\" fill=\"none\" stroke-linecap=\"round\"/><circle cx=\"16\" cy=\"-23\" r=\"3.2\" fill=\"${DGOLD}\"/>\n      <\u002Fg>`;\n    }\n\n    /* ---------- the comb (no dotted cells — all solid, aligned) ---------- */\n    const LAYOUT=['..haa..','.adhda.','hdaLadh','.hadha.','..dah..'];\n    function comb(cx,cy,r,opts){\n      opts=opts||{};\n      const w=Math.sqrt(3)*r,rows=opts.rows||LAYOUT;\n      let cells='',peekers='',drips='';\n      const blob=`<path class=\"combBlob\" fill=\"${WAX}\" d=\"M ${P(cx-6.0*r)} ${P(cy-0.6*r)} C ${P(cx-6.4*r)} ${P(cy-2.8*r)} ${P(cx-3.9*r)} ${P(cy-4.3*r)} ${P(cx-1.8*r)} ${P(cy-4.5*r)} C ${P(cx-0.2*r)} ${P(cy-5.0*r)} ${P(cx+2.0*r)} ${P(cy-4.8*r)} ${P(cx+3.5*r)} ${P(cy-4.2*r)} C ${P(cx+5.9*r)} ${P(cy-3.4*r)} ${P(cx+6.5*r)} ${P(cy-1.5*r)} ${P(cx+6.2*r)} ${P(cy+0.4*r)} C ${P(cx+6.4*r)} ${P(cy+2.4*r)} ${P(cx+4.6*r)} ${P(cy+4.1*r)} ${P(cx+2.4*r)} ${P(cy+4.6*r)} C ${P(cx+0.6*r)} ${P(cy+5.1*r)} ${P(cx-2.1*r)} ${P(cy+5.0*r)} ${P(cx-3.9*r)} ${P(cy+4.2*r)} C ${P(cx-5.9*r)} ${P(cy+3.4*r)} ${P(cx-6.3*r)} ${P(cy+1.4*r)} ${P(cx-6.0*r)} ${P(cy-0.6*r)} Z\"/>`;\n      rows.forEach((row,ri)=>{\n        const y=cy+(ri-(rows.length-1)/2)*r*1.5;\n        row.split('').forEach((ch,ci)=>{\n          if(ch==='.')return;\n          const x=cx+(ci-(row.length-1)/2)*w+(ri%2?w/2:0);\n          let fill=WAXO;\n          if(ch==='h')fill=HONEY;\n          if(ch==='d')fill=CELLDARK;\n          if(ch==='L')fill='#FFDF7E';\n          const shadow=`<path d=\"M${P(x-0.62*r)} ${P(y-0.36*r)} L${P(x)} ${P(y-0.72*r)} L${P(x+0.62*r)} ${P(y-0.36*r)}\" stroke=\"rgba(36,31,24,.16)\" stroke-width=\"${P(r*.24)}\" fill=\"none\" stroke-linecap=\"round\"/>`;\n          const glow=ch==='h'?`<ellipse cx=\"${P(x-0.2*r)}\" cy=\"${P(y+0.2*r)}\" rx=\"${P(r*.3)}\" ry=\"${P(r*.2)}\" fill=\"#FFE9A8\" opacity=\".9\"/>`:'';\n          cells+=`<g class=\"cell${ch==='L'?' ledger':''}\">${hexPoly(x,y,r*.94,fill,DGOLD,3.2)}${shadow}${glow}<\u002Fg>`;\n          if(opts.peek&&ch==='d'&&(ci*3+ri)%4===0){peekers+=peeker(x,y+r*.3,r/38);}\n          if(opts.drip&&ch==='h'&&ri===rows.length-2&&!drips){drips=`<g class=\"dripG\" transform=\"translate(${P(x)},${P(y+r*.72)})\"><path class=\"drip\" d=\"M0 0 C -7 12 -7 22 0 27 C 7 22 7 12 0 0 Z\" fill=\"${HONEY}\" stroke=\"${DGOLD}\" stroke-width=\"2\"/><\u002Fg>`;}\n        });\n      });\n      return `<g class=\"combG\">${blob}${cells}${peekers}${drips}<\u002Fg>`;\n    }\n\n    function flower(x,y,s,c,cls){\n      let petals='';\n      for(let i=0;i<6;i++){petals+=`<ellipse cx=\"0\" cy=\"-14\" rx=\"8.5\" ry=\"14\" fill=\"${c}\" transform=\"rotate(${i*60})\"/>`;}\n      return `<g class=\"flowerG ${cls||''}\" transform=\"translate(${x},${y}) scale(${s})\">\n        <path d=\"M0 6 L0 64\" stroke=\"${GREEND}\" stroke-width=\"5\" stroke-linecap=\"round\"/>\n        <path d=\"M1 42 q13 -3 19 -13\" stroke=\"${GREEND}\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\"/>\n        <ellipse cx=\"22\" cy=\"27\" rx=\"9\" ry=\"5\" fill=\"${GREEN}\" transform=\"rotate(-32 22 27)\"/>\n        <g class=\"head\">${petals}<circle r=\"9.5\" fill=\"${HONEY}\" stroke=\"${DGOLD}\" stroke-width=\"2.5\"/><\u002Fg>\n      <\u002Fg>`;\n    }\n\n    function grass(x,y,s){\n      return `<g class=\"grassG\" transform=\"translate(${x},${y}) scale(${s||1})\" stroke=\"${GREEN}\" stroke-width=\"4\" fill=\"none\" stroke-linecap=\"round\">\n        <path d=\"M0 0 q-4 -18 -12 -24\"/><path d=\"M4 0 q0 -20 -2 -28\"/><path d=\"M8 0 q6 -16 14 -22\"/>\n      <\u002Fg>`;\n    }\n\n    function hexGrid(r,ax,ay,op){\n      const w=Math.sqrt(3)*r,h=3*r,id='grid'+(++uid);\n      const px=((ax-w/2)%w+w)%w,py=((ay-r)%h+h)%h;\n      return `<defs><pattern id=\"${id}\" width=\"${P(w)}\" height=\"${P(h)}\" patternUnits=\"userSpaceOnUse\" x=\"${P(px)}\" y=\"${P(py)}\">\n        <path d=\"M${P(w/2)} 0 L${P(w)} ${P(r/2)} V${P(1.5*r)} L${P(w/2)} ${P(2*r)} L0 ${P(1.5*r)} V${P(r/2)} Z M${P(w/2)} ${P(2*r)} V${P(h)}\" fill=\"none\" stroke=\"${DGOLD}\" stroke-width=\"1.5\"/>\n      <\u002Fpattern><\u002Fdefs><rect class=\"gridBG\" x=\"-300\" y=\"-40\" width=\"6600\" height=\"840\" fill=\"url(#${id})\" opacity=\"${op==null?.1:op}\"/>`;\n    }\n\n    function pollen(n,seed){\n      let s='';\n      for(let i=0;i<n;i++){\n        const x=((seed*97+i*263)%1160)+20,y=((seed*57+i*173)%540)+80;\n        s+=`<circle class=\"mote\" cx=\"${x}\" cy=\"${y}\" r=\"${2+(i%3)}\" fill=\"${GOLD}\" opacity=\"${(.22+(i%3)*.11).toFixed(2)}\"/>`;\n      }\n      return `<g class=\"pollenG\">${s}<\u002Fg>`;\n    }\n\n    function longBand(yBase,amp,fill){\n      let d='M -300 '+yBase,x=-300,up=true;\n      while(x<6300){d+=' Q '+(x+160)+' '+(yBase+(up?-amp:amp))+' '+(x+320)+' '+yBase;x+=320;up=!up;}\n      d+=' L 6300 820 L -300 820 Z';\n      return '<path d=\"'+d+'\" fill=\"'+fill+'\"/>';\n    }\n\n    /* ================= BUILD THE WORLD ================= */\n    const W=q('#world');\n\n    const tints=['#E9C46A','#D98A78','#C9CF9A','#E0B25C'];\n    const doors=[\n      `<g transform=\"translate(82,-80)\"><path d=\"M0 0 V-34\" stroke=\"${BRANCH}\" stroke-width=\"3.5\"/><path d=\"M0 -34 L26 -27 L0 -20 Z\" fill=\"#D98A78\"/><\u002Fg>`,\n      `<g transform=\"translate(80,-80)\"><path d=\"M0 0 V-32\" stroke=\"${BRANCH}\" stroke-width=\"3.5\"/><circle cx=\"0\" cy=\"-40\" r=\"9\" fill=\"#C9CF9A\" stroke=\"${BRANCH}\" stroke-width=\"2.5\"/><\u002Fg>`,\n      `<g transform=\"translate(82,-78)\"><path d=\"M0 0 V-30\" stroke=\"${BRANCH}\" stroke-width=\"3.5\"/><rect x=\"-9\" y=\"-46\" width=\"18\" height=\"15\" fill=\"${GOLD}\" stroke=\"${BRANCH}\" stroke-width=\"2.5\"/><\u002Fg>`,\n      `<g transform=\"translate(80,-80)\"><path d=\"M0 0 V-30\" stroke=\"${BRANCH}\" stroke-width=\"3.5\"/><path d=\"M-8 -30 l8 -8 8 8 -8 8 Z\" fill=\"#E0B25C\" stroke=\"${BRANCH}\" stroke-width=\"2.5\"/><\u002Fg>`\n    ];\n    const extras=[\n      peeker(0,9,.7),'',\n      `<g transform=\"translate(-104,84)\">${bee(0,0,.55,{sleep:true,still:true,flip:true})}<\u002Fg>`,''\n    ];\n    const GW=Math.sqrt(3)*28;\n    const MPOS=[[2000,225],[2363.7,351],[2169.7,603],[1830.3,393]];\n    const garden=i=>`<g class=\"mini\" transform=\"translate(${MPOS[i][0]},${MPOS[i][1]})\">\n      <ellipse cx=\"0\" cy=\"98\" rx=\"110\" ry=\"18\" fill=\"#EFE3BE\"/>\n      ${hexPoly(-GW/2,-42,28,tints[i],DGOLD,3)}${hexPoly(GW/2,-42,28,tints[i],DGOLD,3)}\n      ${hexPoly(-GW,0,28,tints[i],DGOLD,3)}${hexPoly(GW,0,28,tints[i],DGOLD,3)}\n      ${hexPoly(-GW/2,42,28,tints[i],DGOLD,3)}${hexPoly(GW/2,42,28,tints[i],DGOLD,3)}\n      ${hexPoly(0,0,28,CELLDARK,DGOLD,3)}\n      ${doors[i]}${extras[i]}\n    <\u002Fg>`;\n\n    const L3=[[3520,210],[3680,400],[3520,600]];\n    const listener=(i,withBee)=>`<g class=\"listener li${i}\" transform=\"translate(${L3[i][0]},${L3[i][1]})\">\n      <polygon class=\"lhex\" points=\"${hexPts(0,0,62)}\" fill=\"rgba(228,179,60,.12)\" stroke=\"${GOLD}\" stroke-width=\"3.5\" opacity=\"0\"/>\n      ${withBee?`<g class=\"hopW\">${bee(0,6,.92,{flip:true})}<\u002Fg>`:''}\n    <\u002Fg>`;\n\n    /* dark cells: couriers settle here; home bees tuck into others */\n    const CELLS=[[738.6,470],[703.9,410],[530.7,590]];\n    const TUCK=[[565.4,410],[461.4,470],[634.6,530]];\n\n    W.innerHTML=`\n      <g class=\"gridL\">${hexGrid(40,600,470)}<\u002Fg>\n      <g class=\"bgFarL\">${longBand(640,22,'#F3E8C8')}<\u002Fg>\n      <g class=\"bgMidL\">${longBand(688,18,'#EEDFB4')}\n        ${flower(120,700,1.0,'#D98A78')}${flower(1130,706,.9,'#C9CF9A')}${grass(240,724,1.2)}${grass(1044,730,1)}\n        ${flower(1900,702,.95,'#E9C46A')}${grass(2320,726,1.1)}\n        ${flower(2980,704,1.0,'#D98A78')}${grass(3420,728,1)}\n        ${flower(4080,700,.9,'#C9CF9A')}${grass(4560,724,1.2)}${flower(5150,706,.95,'#E9C46A')}\n      <\u002Fg>\n      <g class=\"camMain\">\n        ${longBand(730,14,'#E7D5A2')}\n        ${grass(640,760 :.05},{x:-3,y:2,duration:.05},{x:2,y:-1,duration:.05},{x:0,y:0,duration:.06}]},33.5)\n      .to('#world .homeZ .peeker',{y:16,duration:.2,ease:'power2.in'},33.5)\n      .to('#world .dustm',{opacity:.9,duration:.08,stagger:.02},33.5)\n      .to('#world .dustm',{x:i=>[-42,-18,26,44,-30,36,12,-8][i],y:i=>[-30,-46,-38,-16,10,18,-54,26][i],duration:.6,ease:'power2.out',stagger:.02},33.5)\n      .to('#world .waspW',{scaleX:1,scaleY:1,duration:.15},33.6)\n      .to('#world .waspW',{x:990,y:80,rotation:35,duration:.8,ease:'power2.out'},33.62)\n      .to('#world .waspW',{keyframes:[{rotation:15,duration:.3},{rotation:45,duration:.3},{rotation:28,duration:.3}],ease:'sine.inOut'},34.5)\n      .to('#world .waspW',{y:'+=18',duration:.45,yoyo:true,repeat:1,ease:'sine.inOut'},34.5)\n      .to('#world .dustm',{y:'+=80',opacity:0,duration:.8,ease:'power1.in',stagger:.04},34.3)\n      .to('#world .homeZ .peeker',{y:0,duration:.4,ease:'back.out(2)'},35.0)\n      .to('#world .waspW',{x:1400,y:-220,rotation:160,scale:.6,opacity:0,duration:1.1,ease:'power1.in'},35.5)\n      .to('#world .calmLabel',{opacity:0,duration:.5},36.7);\n    copyIn('#copy5',34.2);\n    tl.addLabel('s5',37.2);\n\n    /* === STEP 6 · the harvest === */\n    copyOut('#copy5',37.4);\n    tl.to('#world .shieldG',{opacity:0,duration:.6},37.6);\n    tl.to('#world .heroBee',{motionPath:{path:'#hp0',align:'#hp0',alignOrigin:[.5,.5]},duration:1.2,ease:'power1.inOut'},37.8)\n      .to('#hp0',{strokeDashoffset:0,duration:1.2,ease:'power1.inOut'},37.8)\n      .to('#world .heroBee',{scale:.92,duration:.12,yoyo:true,repeat:1,transformOrigin:'center'},39.0)\n      .to('#world .heroBee .droplet',{opacity:0,duration:.15},39.1)\n      .fromTo('#world .dropG0',{x:486,y:396,opacity:0,scale:1},{opacity:1,duration:.12},39.08)\n      .to('#world .dropG0',{x:600,y:470,scale:.7,duration:.45,ease:'power1.in'},39.2)\n      .to('#world .dropG0',{opacity:0,duration:.12},39.65)\n      .to('#world .homeZ .ledger',{scale:1.1,duration:.13,yoyo:true,repeat:1,transformOrigin:'center'},39.66);\n    const HD=[[374,462],[486,528]];\n    [1,2].forEach(i=>{\n      const t=38.1+(i-1)*.6;\n      tl.to('#world .h'+i,{motionPath:{path:'#hp'+i,align:'#hp'+i,alignOrigin:[.5,.5]},duration:1.8,ease:'power1.inOut'},t)\n        .to('#hp'+i,{strokeDashoffset:0,duration:1.8,ease:'power1.inOut'},t)\n        .to('#world .h'+i,{scale:.92,duration:.12,yoyo:true,repeat:1,transformOrigin:'center'},t+1.8)\n        .to('#world .h'+i+' .droplet',{opacity:0,duration:.15},t+1.9)\n        .fromTo('#world .dropG'+i,{x:HD[i-1][0],y:HD[i-1][1],opacity:0,scale:1},{opacity:1,duration:.12},t+1.88)\n        .to('#world .dropG'+i,{x:600,y:470,scale:.7,duration:.45,ease:'power1.in'},t+2.02)\n        .to('#world .dropG'+i,{opacity:0,duration:.12},t+2.47)\n        .to('#world .homeZ .ledger',{scale:1.1,duration:.13,yoyo:true,repeat:1,transformOrigin:'center'},t+2.48);\n    });\n    tl.to('#world .homeZ .ledger',{scale:1.2,transformOrigin:'center',duration:.4,ease:'back.out(3)'},41.4)\n      .fromTo('#world .burst polygon',{scale:0,opacity:1,transformOrigin:'center'},{scale:1,stagger:.05,duration:.4,ease:'back.out(2)'},41.46)\n      .to('#world .burst polygon',{y:-20,opacity:0,duration:.6,stagger:.05},41.9)\n      .fromTo('#world .tally',{opacity:0,y:22},{opacity:1,y:0,duration:.5,ease:'power2.out'},41.6);\n    copyIn('#copy6',39.9);\n    tl.addLabel('s6',42.4);\n\n    /* === STEP 7 · home, in its own cell === */\n    copyOut('#copy6',42.6);\n    tl.to('#world .hpaths path',{opacity:0,duration:.8},42.6)\n      .to('#world .tally',{opacity:0,duration:.6},42.9);\n    const SITTERS=['#world .heroBee','#world .h1','#world .h2'];\n    SITTERS.forEach((sel,i)=>{\n      const t=42.9+i*.6;\n      tl.to(sel,{x:CELLS[i][0],y:CELLS[i][1]+6,scale:.5,duration:.7,ease:'power1.inOut'},t)\n        .to(sel,{scale:.12,opacity:0,duration:.35,ease:'power1.in'},t+.7)\n        .fromTo('#world .sitF'+i,{opacity:0,scale:.3,transformOrigin:'center'},{opacity:1,scale:1,duration:.5,ease:'back.out(2.5)'},t+.95);\n    });\n    copyIn('#copy7',44.8);\n    tl.addLabel('s7',45.8);\n\n    /* === STEP 8 · finale === */\n    copyOut('#copy7',46.0);\n    tl.fromTo('#finaleOv',{autoAlpha:0},{autoAlpha:1,duration:1.2},46.3)\n      .fromTo('#finaleInner > *',{y:28,opacity:0},{y:0,opacity:1,stagger:.12,duration:.8,ease:'power2.out'},46.7);\n    tl.addLabel('s8',48.0);\n\n    /* finale bee */\n    const f=q('#svgF');\n    f.innerHTML=`<polygon class=\"fRing\" points=\"${hexPts(110,88,44)}\" fill=\"none\" stroke=\"${GOLD}\" stroke-width=\"3\" opacity=\"0\"/>\n      <g class=\"fBee\">${bee(96,88,.6,{master:true})}<\u002Fg>`;\n\n    /* ================= STEP NAVIGATION ================= */\n    const STEPS=['s0','s1','s2','s3','s4','s5','s6','s7','s8'];\n    let cur=0,drv=null;\n    const driving=()=>!!(drv&&drv.isActive());\n    const prevB=q('#navPrev'),nextB=q('#navNext'),count=q('#stepCount');\n    const prog=q('#prog');\n    prog.innerHTML='';\n    prog.style.display=SHOW_DOTS?'flex':'none';\n    if(SHOW_DOTS){\n      STEPS.forEach((_,i)=>{\n        const sp=document.createElement('span');\n        sp.style.cssText='width:12px;height:12px;display:block;cursor:pointer;clip-path:polygon(25% 5%,75% 5%,100% 50%,75% 95%,25% 95%,0 50%);background:rgba(36,31,24,.18);transition:background .3s';\n        sp.addEventListener('click',()=>{if(driving()){drv.progress(1);}goTo(i,true);});\n        prog.appendChild(sp);\n      });\n    }\n    function updateUI(){\n      if(SHOW_DOTS)[...prog.children].forEach((d,i)=>d.style.background=i===cur?'#E4B33C':'rgba(36,31,24,.18)');\n      count.textContent=(cur+1)+' / '+STEPS.length;\n      prevB.disabled=cur===0;\n      nextB.disabled=cur===STEPS.length-1;\n    }\n    function goTo(i,viaDots){\n      i=Math.max(0,Math.min(STEPS.length-1,i));\n      const tt=tl.labels[STEPS[i]],ct=tl.time();\n      if(i===cur&&Math.abs(tt-ct)<.01)return;\n      if(drv)drv.kill();\n      cur=i;updateUI();\n      if(RM){tl.time(tt);return;}\n      let dur,ease;\n      if(tt>ct){dur=(tt-ct)*PACE;ease='none';if(viaDots)dur=Math.min(dur,2.6);}\n      else{dur=Math.min(1.1,(ct-tt)*.22);ease='power2.inOut';}\n      drv=gsap.to(tl,{time:tt,duration:Math.max(dur,.35),ease:ease});\n    }\n    function nav(d){ if(driving()){drv.progress(1);} goTo(cur+d); }\n    prevB.addEventListener('click',()=>nav(-1));\n    nextB.addEventListener('click',()=>nav(1));\n    let acc=0,lastWheel=0,lastNav=0;\n    const onWheel=e=>{\n      e.preventDefault();\n      const now=Date.now();\n      if(now-lastWheel>260)acc=0;\n      lastWheel=now;\n      if(driving()||now-lastNav<600)return;\n      acc+=e.deltaY;\n      if(Math.abs(acc)>90){lastNav=now;const d=acc>0?1:-1;acc=0;goTo(cur+d);}\n    };\n    const onKey=e=>{\n      if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();if(!driving())goTo(cur+1);}\n      else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();if(!driving())goTo(cur-1);}\n    };\n    let tY=null;\n    const onTS=e=>{tY=e.touches[0].clientY;};\n    const onTE=e=>{\n      if(tY==null)return;\n      const dy=tY-e.changedTouches[0].clientY;tY=null;\n      if(Math.abs(dy)>50&&!driving())goTo(cur+(dy>0?1:-1));\n    };\n    window.addEventListener('wheel',onWheel,{passive:false});\n    window.addEventListener('keydown',onKey);\n    window.addEventListener('touchstart',onTS,{passive:true});\n    window.addEventListener('touchend',onTE);\n    window.__beeNavClean=()=>{\n      window.removeEventListener('wheel',onWheel);\n      window.removeEventListener('keydown',onKey);\n      window.removeEventListener('touchstart',onTS);\n      window.removeEventListener('touchend',onTE);\n      if(drv)drv.kill();\n    };\n    updateUI();\n\n    /* ================= AMBIENT LOOPS ================= */\n    const loop=fn=>{if(!RM&&AMBIENT)fn();};\n    loop(()=>{gsap.utils.toArray('#world .floatB .beeG').forEach((b,i)=>gsap.to(b,{y:'-=12',duration:2+i*.4,yoyo:true,repeat:-1,ease:'sine.inOut',delay:1.6}));});\n    loop(()=>{gsap.to('#world .masterW .beeG',{y:'-=8',duration:1.9,yoyo:true,repeat:-1,ease:'sine.inOut'});});\n    loop(()=>{gsap.to('#world .heroBee .beeG',{y:'-=7',duration:1.7,yoyo:true,repeat:-1,ease:'sine.inOut'});});\n    loop(()=>{gsap.utils.toArray('#world .pkEyes').forEach((el,i)=>{\n      gsap.timeline({repeat:-1,repeatDelay:2.4+i*1.1,delay:i*.7})\n        .to(el,{scaleY:.12,transformOrigin:'center',duration:.07})\n        .to(el,{scaleY:1,duration:.1},'+=.06');});});\n    loop(()=>{gsap.utils.toArray('#world .drip').forEach((el,i)=>{\n      gsap.timeline({repeat:-1,repeatDelay:1.6+i,delay:i*.9})\n        .fromTo(el,{y:0,scaleY:.25,transformOrigin:'50% 0%',opacity:0},{opacity:1,scaleY:1,duration:.9,ease:'power1.in'})\n        .to(el,{y:26,opacity:0,duration:.5,ease:'power1.in'});});});\n    loop(()=>{gsap.utils.toArray('#world .mote').forEach((el,i)=>{\n      gsap.to(el,{y:'-=26',x:'+=14',duration:3+(i%4),yoyo:true,repeat:-1,ease:'sine.inOut',delay:i*.35});});});\n    loop(()=>{gsap.utils.toArray('#world .flowerG').forEach((el,i)=>{\n      gsap.to(el,{rotation:2.5+(i%3),transformOrigin:'50% 100%',duration:2.4+(i%5)*.3,yoyo:true,repeat:-1,ease:'sine.inOut',delay:(i%4)*.4});});});\n    loop(()=>{gsap.to('#world .sunRays',{rotation:360,svgOrigin:'5240 120',duration:40,repeat:-1,ease:'none'});});\n    loop(()=>{gsap.utils.toArray('#world .ptl').forEach((el,i)=>{\n      gsap.fromTo(el,{y:-30,x:0,rotation:0,opacity:0},{y:140,x:70,rotation:160,opacity:.75,duration:5+i,repeat:-1,ease:'none',delay:i*1.2});});});\n    loop(()=>{gsap.utils.toArray('#world .zz').forEach((el,i)=>{\n      gsap.to(el,{keyframes:[{y:-12,opacity:1,duration:.9},{y:-30,opacity:0,duration:.9}],repeat:-1,delay:i*.6,ease:'sine.out'});});});\n    loop(()=>{\n      gsap.to('#svgF .fBee',{y:-8,duration:2.2,yoyo:true,repeat:-1,ease:'sine.inOut'});\n      gsap.fromTo('#svgF .fRing',{scale:.8,opacity:.85},{scale:1.3,opacity:0,duration:2.6,repeat:-1,ease:'sine.out',svgOrigin:'110 88'});\n    });\n    });\n  }\n}\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
